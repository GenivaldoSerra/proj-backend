name: proj-backend-dev

services:

  # ==========================
  # Database
  # ==========================
  postgres:
    image: postgres:15-alpine

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: teste_db

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

  # ==========================
  # Application
  # ==========================
  backend:
    build:
      context: ..

    ports:
      - "3000:3000"

    env_file:
      - ../.env

    depends_on:
      - postgres

    restart: unless-stopped

volumes:
  postgres-data: